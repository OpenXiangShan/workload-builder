#------------------------------------------------------------------------------
# SPEC CPU(R) 2026 config for gcc/g++/gfortran on Linux RISCV-64
#------------------------------------------------------------------------------
#
# This file is a build-oriented copy of the official Example-gcc-linux-riscv64
# config shipped with the CPU2026 kit. The workload helper passes `gcc_dir`
# and build parallelism on the command line so this file can stay in-repo.
# `gcc_dir` is the toolchain root, and the compiler binaries are the prefixed
# `riscv64-unknown-linux-gnu-*` tools under `bin/`.
#

%ifndef %{label}
   label   = spec2026
%else
   label   = %{label}
%endif

%ifndef %{build_ncpus}
%   define  build_ncpus 8
%endif

default:
   bench_post_setup     = sync
   command_add_redirect = 1
   flagsurl             = $[top]/config/flags/gcc.xml
   ignore_errors        = 1
   iterations           = 1
   line_width           = 1020
   log_line_width       = 1020
   makeflags            = --jobs=%{build_ncpus}
   mean_anyway          = 1
   output_format        = txt,html,cfg,pdf,csv
   preenv               = 1
   reportable           = 0
   tune                 = base

default:
   copies                 = 1
   threads                = 4

%ifndef %{gcc_dir}
%   define gcc_dir "/opt/gcc-15"
%endif

%define GCCge10

default:
   preENV_LD_LIBRARY_PATH  = %{gcc_dir}/lib64/:%{gcc_dir}/lib/:/lib64
   SPECLANG                = %{gcc_dir}/bin/riscv64-unknown-linux-gnu-
   CC                      = $(SPECLANG)gcc      -std=c18
   CXX                     = $(SPECLANG)g++      -std=c++17
   FC                      = $(SPECLANG)gfortran -std=f2018
   CC_VERSION_OPTION       = --version
   CXX_VERSION_OPTION      = --version
   FC_VERSION_OPTION       = --version

800.pot3d_s:
  PORTABILITY = -DSPEC_SUPPRESS_LOCAL_AND_REDUCE

710.omnetpp_r:
   PORTABILITY = -fno-finite-math-only

734.vpr_r,834.vpr_s:
   PORTABILITY = -fno-finite-math-only

735.gem5_r,835.gem5_s:
   PORTABILITY = -fno-finite-math-only

736.ocio_r:
   PORTABILITY = -fno-finite-math-only

737.gmsh_r:
   PORTABILITY = -fno-fast-math

748.flightdm_r:
   PORTABILITY = -fno-fast-math

753.ns3_r,853.ns3_s:
   PORTABILITY = -fno-finite-math-only

767.nest_r,867.nest_s:
   PORTABILITY = -fno-finite-math-only
   PORTABILITY_LIBS = -lstdc++fs

%ifdef %{GCCge10}
   default:
      EXTRA_FFLAGS = -fallow-argument-mismatch
%endif

intspeed,fpspeed:
   preENV_OMP_STACKSIZE = 120M

doconcurrent:
   EXTRA_FOPTIMIZE = -ftree-parallelize-loops=8

openmp:
   EXTRA_OPTIMIZE  = -fopenmp -DSPEC_OPENMP

cxxthreads:
   EXTRA_OPTIMIZE  = -pthread

default=base:
   OPTIMIZE       = -g -O3 -march=rv64gc_zba_zbb_zbs_zbc

default:
   basepeak = yes
default=peak:
